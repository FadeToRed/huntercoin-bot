name: HunterCoin Auto Update

on:
  schedule:
    - cron: '0 * * * *'  # ogni ora esatta
  workflow_dispatch:       # permette anche avvio manuale

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin
      - run: node update.js
